name: 🚀 Feature Request
description: 새로운 기능 개발 요청 (BE)
title: "[FEAT] "
labels: ["feature", "backend"]
body:
  - type: markdown
    attributes:
      value: |
        ## 새로운 기능을 제안합니다
        BE 팀의 새로운 기능 개발을 위한 템플릿입니다.

  - type: textarea
    id: description
    attributes:
      label: 기능 설명
      description: 어떤 기능인지 간단하게 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: tasks
    attributes:
      label: 작업 항목 (To-do)
      value: |
        - [ ] 작업 1
        - [ ] 작업 2
        - [ ] 작업 3
    validations:
      required: true

  - type: textarea
    id: api
    attributes:
      label: API 명세
      description: 엔드포인트가 있는 경우 작성해주세요.
      value: |
        - Method: 
        - Path: 
        - Request: 
        - Response: 
        - 인증 필요 여부: Yes / No

  - type: textarea
    id: db
    attributes:
      label: DB 변경 사항
      description: 스키마 변경 / 신규 테이블 / 인덱스 등이 필요한 경우 작성해주세요.

  - type: textarea
    id: dependency
    attributes:
      label: 외부 의존성
      description: 외부 API, 라이브러리 등의 의존성이 있다면 명시해주세요.

  - type: input
    id: deadline
    attributes:
      label: 예상 마감일
      placeholder: "YYYY-MM-DD"

  - type: textarea
    id: notes
    attributes:
      label: 참고사항
