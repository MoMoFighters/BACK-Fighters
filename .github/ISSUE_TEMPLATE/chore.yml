name: 🔧 Chore
description: 설정 / 문서 / 기타 작업
title: "[CHORE] "
labels: ["chore", "backend"]
body:
  - type: dropdown
    id: type
    attributes:
      label: 작업 유형
      options:
        - 설정 (config / build / CI/CD)
        - 문서 (README / API 문서 / 가이드)
        - 의존성 (라이브러리 추가/업데이트)
        - 인프라 (배포 / 환경)
        - 기타
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 작업 내용
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 작업 사유
