name: ♻️ Refactor
description: 리팩토링 이슈 (BE)
title: "[REFACTOR] "
labels: ["refactor", "backend"]
body:
  - type: textarea
    id: target
    attributes:
      label: 리팩토링 대상
      description: 어떤 클래스 / 패키지 / 모듈인가요?
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 리팩토링 사유
    validations:
      required: true

  - type: textarea
    id: changes
    attributes:
      label: 변경 사항
      value: |
        - [ ] 
        - [ ] 
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 영향 범위
      description: API 스펙 변경 / 클라이언트 영향 / DB 영향 등

  - type: dropdown
    id: api_change
    attributes:
      label: API 스펙 변경 여부
      options:
        - "변경 없음"
        - "변경 있음 (FE 팀에 공지 필요)"
    validations:
      required: true
